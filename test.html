<html>

<style>
    body {
        background-color: beige;
        text-align: center;
        color: chocolate;
        font-family: Arial;
    }
	button {
    text-align: right;
    height: 60px;
    width: 200px;
    background-color: GoldenRod;
    border-radius: 10px;
    border-width: 3px;
    border-color: SaddleBrown;
}

button:hover {
    background-color: DeepPink;
    cursor: pointer;
}
</style>

<body>
    <h1>My JavaScript Button</h1>

    <script>
        function celebrate() {
          alert("You are coding with JavaScript!");
        }
    </script>

    <button onclick="celebrate()">Click me!</button>
</body>

</html>
